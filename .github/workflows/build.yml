name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Accept Android licenses & Install NDK
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "ndk;27.0.12077973" "cmake;3.22.1"

      - name: Generate Flutter Project Structure
        run: flutter create --org com.universal.sequencer --project-name universal_sequencer .
          
      - name: Inject Required Dependencies
        run: |
          flutter pub add image
          flutter pub add share_plus
          flutter pub add path_provider
          flutter pub add ffi
          flutter pub add google_fonts

      - name: Append C++ Gradle Config safely
        run: |
          cat << 'EOF' >> android/app/build.gradle.kts
          
          android {
              ndkVersion = "27.0.12077973"
              externalNativeBuild {
                  cmake {
                      path = file("src/main/cpp/CMakeLists.txt")
                  }
              }
              defaultConfig {
                  ndk {
                      abiFilters += listOf("arm64-v8a", "armeabi-v7a", "x86_64")
                  }
                  externalNativeBuild {
                      cmake {
                          cppFlags += listOf("-O3", "-DNDEBUG", "-std=c++17")
                      }
                  }
              }
          }
          EOF

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
