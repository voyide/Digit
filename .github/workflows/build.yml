name: Build Android APK

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Accept Android licenses & Install NDK
        run: |
          yes | sdkmanager --licenses
          sdkmanager "ndk;27.0.12077973" "cmake;3.22.1"

      - name: Generate Flutter Project Structure
        run: flutter create --org com.universal.sequencer --project-name universal_sequencer .
          
      - name: Inject Required Dependencies
        run: |
          flutter pub add image
          flutter pub add share_plus
          flutter pub add path_provider
          flutter pub add ffi

      - name: Inject C++ Gradle Config
        run: |
          FILE="android/app/build.gradle.kts"
          # Inject NDK and CMake paths
          sed -i '/android {/a \    ndkVersion = "27.0.12077973"\n    externalNativeBuild {\n        cmake {\n            path = file("src/main/cpp/CMakeLists.txt")\n        }\n    }' $FILE
          # Inject C++ compiler flags
          sed -i '/defaultConfig {/a \        externalNativeBuild {\n            cmake {\n                cppFlags += listOf("-O3", "-DNDEBUG", "-std=c++17")\n            }\n        }\n        ndk {\n            abiFilters += listOf("arm64-v8a", "armeabi-v7a", "x86_64")\n        }' $FILE

      - name: Get Dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: build/app/outputs/flutter-apk/app-release.apk
